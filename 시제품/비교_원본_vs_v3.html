<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Pretendard', sans-serif;
      background: #F0EEEA;
      padding: 40px;
    }
    .comparison {
      display: flex;
      gap: 40px;
      align-items: flex-start;
      justify-content: center;
    }
    .col {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .label {
      font-size: 22px;
      font-weight: 700;
      color: #1A1A1A;
      margin-bottom: 18px;
      letter-spacing: -0.01em;
      text-align: center;
    }
    .label small {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #777;
      margin-top: 4px;
      letter-spacing: 0;
    }
    .banner-wrap {
      background: #FFF;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      border-radius: 4px;
    }
    .banner-wrap img {
      display: block;
      width: 500px;
      height: 1500px;
      object-fit: contain;
      object-position: top;
    }
  </style>
</head>
<body>
  <div class="comparison">
    <div class="col">
      <div class="label">외주업체 원본<small>광주 데시앙 (246×664)</small></div>
      <div class="banner-wrap">
        <img src="../참고자료/외주업체에서 준 것.png">
      </div>
    </div>
    <div class="col">
      <div class="label">v3 시제품<small>인쇄용 폰트 크기 적용 (1200×3600)</small></div>
      <div class="banner-wrap">
        <img src="광주데시앙_X배너_v3.png">
      </div>
    </div>
  </div>
</body>
</html>
